<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiwon's Website</title>
  <style>
    :root {
      color-scheme: dark;
      background: #0f0d18;
      color: #e6e0ff;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f0d18;
      color: #e6e0ff;
    }
    a { color: inherit; text-decoration: none; }
    .app {
      width: 100%;
      min-height: 100vh;
      background: #0f0d18;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem clamp(1rem, 3vw, 2.5rem);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(15,13,24,0.92);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .brand {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #d3c8ff;
    }
    .nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      font-size: 0.94rem;
      color: #c3b7ff;
    }
    .nav a:hover {
      color: #fff;
    }
    .hero-shell {
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 1.4rem;
      padding: calc(2.5rem + 16px) clamp(1rem, 3vw, 3rem);
      max-width: 1320px;
      margin: 0 auto;
      min-height: calc(100vh - 82px);
    }
    .scene {
      position: relative;
      min-height: 360px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      overflow: hidden;
      box-shadow: 0 22px 80px rgba(0,0,0,0.18);
    }
    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(134, 92, 255, 0.18), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(108, 212, 255, 0.10), transparent 24%);
      pointer-events: none;
    }
    .shape {
      position: absolute;
      border-radius: 999px;
      background: rgba(190,165,255,0.22);
      box-shadow: 0 0 40px rgba(131,98,255,0.16);
    }
    .ontology .shape--pulse {
      width: 80px;
      height: 80px;
      top: 20%;
      left: 24%;
      animation: pulse 3.4s ease-in-out infinite;
    }
    .ontology .shape--grid {
      position: absolute;
      width: 82%;
      height: 72px;
      top: 42%;
      left: 10%;
      background-image: linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px), linear-gradient(180deg, rgba(255,255,255,0.10) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .ontology .shape--dot1,
    .ontology .shape--dot2 {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(193,150,255,0.88);
    }
    .ontology .shape--dot1 {
      top: 22%;
      left: 68%;
      animation: float 4s ease-in-out infinite;
    }
    .ontology .shape--dot2 {
      top: 62%;
      left: 32%;
      animation: float 5.2s ease-in-out infinite;
    }
    .document .shape--sheet1 {
      width: 58px;
      height: 72px;
      top: 26%;
      left: 24%;
      transform: rotate(-12deg);
      animation: slide-sheet 3.8s ease-in-out infinite;
      background: rgba(255,255,255,0.14);
      border-radius: 18px;
    }
    .document .shape--sheet2 {
      width: 66px;
      height: 78px;
      top: 46%;
      left: 56%;
      transform: rotate(8deg);
      animation: float 4.5s ease-in-out infinite;
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
    }
    .document .shape--check {
      width: 22px;
      height: 22px;
      top: 34%;
      left: 50%;
      border-radius: 8px;
      background: rgba(125,94,255,0.86);
      animation: pop 1.8s ease-in-out infinite;
    }
    .site .shape--building1,
    .site .shape--building2 {
      width: 18px;
      position: absolute;
      top: 28%;
      background: linear-gradient(180deg, rgba(235,232,255,0.92), rgba(156,118,255,0.88));
      animation: building-rise ease-in-out infinite;
    }
    .site .shape--building1 { left: 28%; height: 94px; animation-duration: 4.2s; }
    .site .shape--building2 { left: 56%; top: 36%; height: 108px; animation-duration: 4.8s; }
    .site .shape--arc {
      width: 160px;
      height: 160px;
      top: 52%;
      left: 30%;
      border-radius: 50%;
      border: 1px dashed rgba(233,223,255,0.22);
      box-shadow: 0 0 40px rgba(125,94,255,0.22);
      animation: rotate 10s linear infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(0.94); opacity: 0.82; } 50% { transform: scale(1.14); opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes slide-sheet { 0%,100% { transform: translateY(0) rotate(-12deg); } 50% { transform: translateY(-12px) rotate(-12deg); } }
    @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    @keyframes building-rise { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media (max-width: 920px) { .hero-shell { grid-template-columns: 1fr; min-height: auto; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Jiwon's Website</div>
      <nav class="nav">
        <a href="/">About Me</a>
        <a href="/paper-publication/">Paper / Publication</a>
        <a href="/project/">Project</a>
        <a href="/blog/">Blog</a>
      </nav>
    </header>
    <main class="hero-shell">
      <section class="scene ontology">
        <div class="shape shape--pulse"></div>
        <div class="shape shape--grid"></div>
        <div class="shape shape--dot1"></div>
        <div class="shape shape--dot2"></div>
      </section>
      <section class="scene document">
        <div class="shape shape--sheet1"></div>
        <div class="shape shape--sheet2"></div>
        <div class="shape shape--check"></div>
      </section>
      <section class="scene site">
        <div class="shape shape--building1"></div>
        <div class="shape shape--building2"></div>
        <div class="shape shape--arc"></div>
      </section>
    </main>
  </div>
</body>
</html>
